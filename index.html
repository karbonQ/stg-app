<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>نظام تسجيل الحضور و الغيابات</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

<h1>📋 نظام تسجيل الحضور</h1>

<h2> التخصصات</h2>

<select id="specialtySelect" onchange="loadTrainees()"></select>

<input type="text" id="newSpecialty" placeholder="تخصص جديد">
<button onclick="addSpecialty()">إضافة تخصص</button>

<hr>

<h2> المتربصين</h2>

<input type="text" id="traineeName" placeholder="اسم المتربص">
<button onclick="addTrainee()">إضافة متربص</button>

<br><br>

<select id="traineeSelect" size="6"></select>

<br><br>

<button onclick="editTrainee()">تعديل الاسم</button>
<button onclick="deleteTrainee()">حذف المتربص</button>

<p id="countTrainees"></p>

<hr>

<h2>تسجيل الحضور</h2>

<input type="date" id="attendanceDate">

<br><br>

<button onclick="markAttendance('حاضر')" class="present">حاضر</button>
<button onclick="markAttendance('غائب')" class="absent">غائب</button>

<hr>

<h2>السجل</h2>

<ul id="attendanceList"></ul>

<button onclick="exportCSV()"> تسجيل الحضور/الغياب Excel</button>

</div>

<script src="script.js"></script>

</body>
</html>
