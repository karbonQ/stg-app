
<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل الحضور و الغيابات اليومية</title> 
<title>تسجيل الحضور و الغيابات اليومية للمتربصين</title> 

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="app">

    <div class="header">
        <h2> وزارة التكوين و التعليم المهنيين </h2>
        <h2> مركز التكوين المهني و التمهين الشهيد أحمد زبانة السوقر1 </h2>
        <h2> تسجيل الحضور </h2>
        <p class="subtitle"> تخصص:الأمــــانة </p>
    </div>

    <label>📅 تاريخ التسجيل</label>
    <input type="date" id="attendanceDate">

    <div class="stats">
        <div class="stat"><span id="presentCount">0</span><small>حضور</small></div>
        <div class="stat"><span id="absentCount">0</span><small>غياب</small></div>
        <div class="stat"><span id="attendanceRate">0%</span><small>النسبة</small></div>
    </div>
<label>اختر التخصص:</label>
<select id="specialtySelect" onchange="loadTrainees()">
    <option value="informatique">تلقين الإعلام الآلي</option>
    <option value="programming">برمجة</option>
    <option value="network">شبكات</option>
</select>
<br><br>
<label>اختر المتربص:</label>
<select id="traineeSelect"></select>

    <input type="text" id="nameInput" placeholder="اسم المتربص">
    <button onclick="addTrainee()">➕ إضافة متربص</button>

    <select id="traineeSelect"></select>

    <button class="present" onclick="markAttendance('حاضر')">✔ حاضر</button>
    <button class="absent" onclick="markAttendance('غائب')">✖ غائب</button>

    <button onclick="editTrainee()">✏️ تعديل الاسم</button>
    <button onclick="deleteTrainee()">🗑 حذف الاسم</button>

    <button onclick="exportToCSV()">📤 تصدير CSV</button>
    <button onclick="clearTodayRecords()">🧹 مسح حضور وغياب هذا اليوم</button>

    <h3>📝 سجل آخر العمليات</h3>
    <ul id="history"></ul>

    <h3>📗 المسجلون حضورًا</h3>
    <ul id="presentList"></ul>

    <h3>📕 المسجلون غيابًا</h3>
    <ul id="absentList"></ul>

</div>

<script src="script.js"></script>
</body>
</html>
