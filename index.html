<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>تسجيل الحضور</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<!-- نافذة تسجيل الدخول -->
    <div id="app" style="display:none;">

<!-- هنا التطبيق كامل -->

</div>
<div id="loginPage">

<h2>تسجيل الدخول</h2>

<input type="text" id="username" placeholder="اسم المستخدم">

<input type="password" id="password" placeholder="كلمة المرور">

<button onclick="login()">دخول</button>

</div>

<!-- واجهة التطبيق -->
<div class="container">

    <h1>📋 تسجيل الحضور</h1>
    <p class="subtitle">إدارة الحضور لمراكز التكوين</p>

    <!-- اختيار التخصص -->
    <label>اختر التخصص:</label>
    <select id="specialtySelect"></select>
    <input type="text" id="newSpecialty" placeholder="اسم التخصص الجديد">
    <button onclick="addSpecialty()">إضافة تخصص</button>
    <button onclick="editSpecialty()">✏ تعديل التخصص</button>
    <button onclick="deleteSpecialty()">🗑 حذف التخصص</button>

    <hr>

    <!-- إضافة متربص -->
    <label>اختر المتربص:</label>
    <select id="traineeSelect"></select>
    <input type="text" id="nameInput" placeholder="اسم المتربص">
    <button onclick="addTrainee()">إضافة متربص</button>
    <button onclick="editTrainee()">✏ تعديل متربص</button>
    <button onclick="deleteTrainee()">🗑 حذف متربص</button>

    <hr>

    <!-- اختيار التاريخ -->
    <label>تاريخ تسجيل الحضور/الغياب:</label>
    <input type="date" id="attendanceDate">

    <!-- أزرار الحضور/الغياب -->
    <div class="actions">
        <button class="presentBtn" onclick="markAttendance('حاضر')">✔ حضور</button>
        <button class="absentBtn" onclick="markAttendance('غائب')">✖ غياب</button>
        <button onclick="clearDayRecords()">🗑 مسح سجلات اليوم</button>
    </div>

    <hr>

    <!-- الإحصائيات -->
<h3>📊 إحصائيات الحضور</h3>
<div class="chartBox">
    <canvas id="attendanceChart"></canvas>
</div>
    <!-- السجل -->
    <ul id="attendanceList"></ul>

    <button onclick="exportCSV()">📤 تصدير إلى Excel</button>
</div>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="script.js"></script>
</body>
</html>
